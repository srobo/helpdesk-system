name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Static type checking
        run: make type

      - name: Formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test

      - name: Django Static Checks
        run: make check
